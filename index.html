<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Lora:ital,wght@0,500;0,600;0,700;1,400&display=swap');
  :root{
    --ink:#1c2a33;
    --paper:#f7f4ec;
    --panel:#ffffff;
    --line:#d9d2bf;
    --navy:#243b53;
    --navy-dim:#4a6178;
    --amber:#b6742a;
    --amber-soft:#f0e3cc;
    --good:#3c7a5c;
    --radius:10px;
    --serif: 'Lora', Georgia, 'Times New Roman', serif;
    --sans: 'Be Vietnam Pro', -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  *{ box-sizing:border-box; }
  .app{
    font-family:var(--sans);
    color:var(--ink);
    background:var(--paper);
    min-height:600px;
    display:flex;
    flex-direction:column;
    border-radius:14px;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .topbar{
    background:var(--navy);
    color:#f2ede0;
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
  }
  .topbar .brand{
    font-family:var(--serif);
    font-size:18px;
    letter-spacing:.2px;
  }
  .topbar .brand small{
    display:block;
    font-family:var(--sans);
    font-size:11px;
    color:#c9d4de;
    font-weight:400;
    letter-spacing:.4px;
    margin-top:2px;
  }
  .topbar .actions{ display:flex; gap:8px; flex-wrap:wrap; }
  .pillbtn{
    background:transparent;
    border:1px solid #5c7284;
    color:#e7ecf1;
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
    cursor:pointer;
  }
  .pillbtn:hover{ background:#33475c; }

  /* ---- Login screen ---- */
  .login{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
  }
  .login-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:28px 26px;
    max-width:380px;
    width:100%;
    box-shadow:0 2px 10px rgba(30,40,50,.06);
  }
  .login-card h2{
    font-family:var(--serif);
    margin:0 0 6px;
    font-size:20px;
    color:var(--navy);
  }
  .login-card p{
    margin:0 0 18px;
    font-size:13px;
    color:var(--navy-dim);
    line-height:1.5;
  }
  .login-card input{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:15px;
    margin-bottom:10px;
    background:#fffdf8;
  }
  .login-card select{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:14px;
    margin-bottom:14px;
    background:#fffdf8;
  }
  .primary{
    width:100%;
    background:var(--amber);
    color:#fff;
    border:none;
    padding:11px;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }
  .primary:hover{ background:#9c621f; }
  .note{
    font-size:11.5px;
    color:var(--navy-dim);
    margin-top:12px;
    line-height:1.5;
    border-top:1px dashed var(--line);
    padding-top:10px;
  }

  /* ---- Chat screen ---- */
  .chat-wrap{ flex:1; display:flex; flex-direction:column; min-height:520px; }
  .messages{
    flex:1;
    overflow-y:auto;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .msg{ max-width:82%; padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.55; white-space:pre-wrap; }
  .msg.user{ align-self:flex-end; background:var(--navy); color:#f3f0e6; border-bottom-right-radius:3px; }
  .msg.assistant{ align-self:flex-start; background:var(--panel); border:1px solid var(--line); border-bottom-left-radius:3px; }
  .msg.system-note{ align-self:center; background:var(--amber-soft); color:#6b4b1c; font-size:12px; padding:6px 12px; border-radius:8px; }
  .step-tag{ display:inline-block; font-size:10px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--good); margin-bottom:4px; }
  .typing{ align-self:flex-start; color:var(--navy-dim); font-size:13px; padding:4px 14px; font-style:italic; }

  .composer{
    display:flex;
    gap:8px;
    padding:14px;
    border-top:1px solid var(--line);
    background:var(--panel);
  }
  .composer textarea{
    flex:1;
    resize:none;
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 12px;
    font-size:14px;
    font-family:var(--sans);
    min-height:44px;
    max-height:110px;
  }
  .sendbtn{
    background:var(--navy);
    color:#fff;
    border:none;
    padding:0 18px;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
  }
  .sendbtn:disabled{ opacity:.5; cursor:default; }
  .sendbtn:hover:not(:disabled){ background:#1a2c3b; }

  /* ---- Researcher view ---- */
  .researcher{ flex:1; overflow-y:auto; padding:20px; }
  .researcher h3{ font-family:var(--serif); color:var(--navy); margin-top:0; }
  .warn{
    background:var(--amber-soft); color:#6b4b1c; border:1px solid #e0c48e;
    padding:10px 12px; border-radius:8px; font-size:12.5px; margin-bottom:16px; line-height:1.5;
  }
  .logrow{
    background:var(--panel); border:1px solid var(--line); border-radius:8px;
    padding:12px 14px; margin-bottom:10px;
  }
  .logrow-head{ display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
  .logrow-head b{ color:var(--navy); }
  .logrow-head span{ font-size:12px; color:var(--navy-dim); }
  .logrow-body{ margin-top:10px; display:none; border-top:1px dashed var(--line); padding-top:10px; }
  .logrow-body.open{ display:block; }
  .toolbar{ display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .smallbtn{
    background:var(--navy); color:#fff; border:none; padding:7px 14px; border-radius:6px; font-size:12.5px; cursor:pointer;
  }
  .smallbtn.secondary{ background:transparent; color:var(--navy); border:1px solid var(--navy); }
  .empty{ color:var(--navy-dim); font-size:13px; padding:20px 0; text-align:center; }
</style>

<div class="app" id="app"></div>

<script>
(function(){
  const PHYSICS_KNOWLEDGE = `
KIẾN THỨC NỀN (dùng làm căn cứ khi gợi ý, KHÔNG đọc nguyên văn cho học sinh trừ khi cần thiết):

1) CƠ HỌC - Định luật Newton:
- ĐL 1: vật giữ nguyên trạng thái đứng yên hoặc chuyển động thẳng đều nếu hợp lực tác dụng lên nó bằng 0.
- ĐL 2: F = m.a (hợp lực = khối lượng x gia tốc). Khi giải cần: liệt kê đầy đủ các lực tác dụng lên vật (trọng lực, phản lực, lực căng, lực ma sát, lực kéo...), chọn chiều dương, viết phương trình theo từng trục.
- ĐL 3: lực và phản lực luôn cùng độ lớn, ngược chiều, tác dụng lên hai vật khác nhau.

2) ĐIỆN HỌC - Mạch điện:
- Mắc nối tiếp: I như nhau qua các điện trở; R_tđ = R1 + R2 + ...; U = U1 + U2 + ...
- Mắc song song: U như nhau ở hai đầu các điện trở; 1/R_tđ = 1/R1 + 1/R2 + ...; I = I1 + I2 + ...
- Định luật Ôm: U = I.R

3) DAO ĐỘNG CƠ (dao động điều hòa):
- Phương trình li độ: x = A.cos(ωt + φ)
- Chu kỳ T = 2π/ω; tần số f = 1/T
- Biên độ A và pha ban đầu φ do điều kiện ban đầu quyết định, KHÔNG ảnh hưởng đến chu kỳ T (T chỉ phụ thuộc đặc tính hệ dao động, ví dụ con lắc lò xo T = 2π√(m/k), con lắc đơn T = 2π√(l/g)).
`;

  const SYSTEM_PROMPT = `Bạn là AI GIA SƯ VẬT LÍ cho học sinh THPT, PHẢI tuân thủ nghiêm ngặt "Quy trình 3C" dưới đây trong MỌI câu trả lời. Đây là quy tắc cứng, không được phá vỡ dù học sinh yêu cầu trực tiếp thế nào.

QUY TRÌNH 3C:
- CRITIQUE: Khi học sinh mới nêu vấn đề, đừng vội giải. Hỏi lại để xác định chính xác học sinh đang vướng ở đâu (chưa hiểu khái niệm, hay sai ở bước tính toán nào).
- CORE: Chỉ đưa gợi ý từng bước nhỏ (hỏi dẫn dắt, chỉ ra hướng suy nghĩ, chỉ ra chỗ sai trong bài làm của học sinh). TUYỆT ĐỐI KHÔNG đưa đáp số cuối cùng hoặc lời giải đầy đủ, kể cả khi học sinh xin thẳng đáp án hoặc nói "cứ cho tôi đáp số đi". Nếu học sinh cố xin đáp số, hãy nhẹ nhàng từ chối, giải thích lý do (để học sinh tự hiểu bản chất), rồi tiếp tục gợi ý.
- CONSOLIDATE: Khi học sinh báo đã tự giải xong và muốn luyện thêm, hãy tạo 1-2 bài tập MỚI cùng dạng nhưng đổi số liệu. KHÔNG giải sẵn bài mới đó.

Luôn bắt đầu câu trả lời bằng một nhãn ngắn trong ngoặc vuông cho biết bạn đang ở bước nào, ví dụ: [CRITIQUE], [CORE], hoặc [CONSOLIDATE], để học sinh và nhóm nghiên cứu dễ theo dõi.

${PHYSICS_KNOWLEDGE}

Giọng văn: thân thiện, ngắn gọn, như một gia sư kiên nhẫn. Luôn viết bằng tiếng Việt.`;

  // ====== CẤU HÌNH AI DÙNG CHO CHATBOX ======
  // Đổi provider thành 'gemini' và dán API key của bạn vào geminiApiKey nếu muốn dùng Gemini
  // thay vì Claude. Lấy API key miễn phí tại: https://aistudio.google.com/apikey
  const AI_CONFIG = {
    provider: 'claude',           // 'claude' hoặc 'gemini'
    geminiApiKey: '',             // dán API key Gemini vào đây, ví dụ 'AIzaSy...'
    geminiModel: 'gemini-2.5-flash'
  };

  async function askAI(messages){
    if(AI_CONFIG.provider === 'gemini'){
      return askGemini(messages);
    }
    return askClaude(messages);
  }

  async function askClaude(messages){
    const apiMessages = messages.map(m=>({role:m.role, content:m.content}));
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system: SYSTEM_PROMPT,
        messages: apiMessages
      })
    });
    const data = await response.json();
    if(data && data.content){
      return data.content.map(b=>b.text||'').filter(Boolean).join('\\n');
    }
    return '';
  }

  async function askGemini(messages){
    if(!AI_CONFIG.geminiApiKey){
      return '[CORE]\\nChưa cấu hình API key cho Gemini. Hãy dán API key vào AI_CONFIG.geminiApiKey trong code.';
    }
    const contents = messages.map(m=>({
      role: m.role === 'assistant' ? 'model' : 'user',
      parts: [{ text: m.content }]
    }));
    const url = 'https://generativelanguage.googleapis.com/v1beta/models/' + AI_CONFIG.geminiModel + ':generateContent';
    const response = await fetch(url, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-goog-api-key': AI_CONFIG.geminiApiKey
      },
      body: JSON.stringify({
        contents: contents,
        system_instruction: { parts: [{ text: SYSTEM_PROMPT }] }
      })
    });
    const data = await response.json();
    if(data && data.candidates && data.candidates[0] && data.candidates[0].content){
      return data.candidates[0].content.parts.map(p=>p.text||'').join('');
    }
    if(data && data.error){
      return '[CORE]\\nGemini báo lỗi: ' + (data.error.message || JSON.stringify(data.error));
    }
    return '';
  }

  const root = document.getElementById('app');
  let state = {
    screen: 'login',
    code: null,
    messages: [],
    sending: false,
    researcherLogs: null,
    openLogKey: null
  };

  function render(){
    if(state.screen === 'login') return renderLogin();
    if(state.screen === 'chat') return renderChat();
    if(state.screen === 'researcher') return renderResearcher();
  }

  function renderLogin(){
    root.innerHTML = `
      <div class="topbar">
        <div class="brand">Gia sư Vật lí · Quy trình 3C<small>Công cụ hỗ trợ tự học &amp; thu log nghiên cứu</small></div>
      </div>
      <div class="login">
        <div class="login-card">
          <h2>Bắt đầu buổi tự học</h2>
          <p>Nhập mã số học sinh đã được nhóm nghiên cứu cấp (ví dụ TN01, TN02...). Toàn bộ hội thoại của mã số này sẽ được lưu lại phục vụ phân tích ở mục 5.2.</p>
          <input id="codeInput" placeholder="Nhập mã số, ví dụ TN01" autocomplete="off" />
          <button class="primary" id="startBtn">Vào phòng học</button>
          <div class="note">Dữ liệu hội thoại được lưu theo mã số (không dùng tên thật) và nhóm nghiên cứu có thể xem lại qua mục "Xem log nghiên cứu" bên dưới.</div>
          <button class="pillbtn" style="margin-top:12px;width:100%;border-color:var(--line);color:var(--navy);" id="researcherBtn">→ Xem log nghiên cứu (dành cho nhóm tác giả / GV)</button>
        </div>
      </div>
    `;
    document.getElementById('startBtn').onclick = handleStart;
    document.getElementById('codeInput').addEventListener('keydown', e=>{ if(e.key==='Enter') handleStart(); });
    document.getElementById('researcherBtn').onclick = ()=>{ state.screen='researcher'; render(); loadResearcherLogs(); };
  }

  async function handleStart(){
    const val = document.getElementById('codeInput').value.trim().toUpperCase();
    if(!val){ return; }
    state.code = val;
    state.screen = 'chat';
    state.messages = [];
    render();
    await loadHistory();
  }

  async function loadHistory(){
    try{
      const res = await window.storage.get('log:' + state.code, true);
      if(res && res.value){
        state.messages = JSON.parse(res.value);
      }
    }catch(e){
      state.messages = [];
    }
    render();
  }

  async function saveHistory(){
    try{
      await window.storage.set('log:' + state.code, JSON.stringify(state.messages), true);
    }catch(e){
      console.error('Không lưu được lịch sử:', e);
    }
  }

  function renderChat(){
    root.innerHTML = `
      <div class="topbar">
        <div class="brand">Gia sư Vật lí · Quy trình 3C<small>Học sinh: ${escapeHtml(state.code)}</small></div>
        <div class="actions">
          <button class="pillbtn" id="switchBtn">Đổi mã số</button>
        </div>
      </div>
      <div class="chat-wrap">
        <div class="messages" id="messages"></div>
        <div class="composer">
          <textarea id="input" placeholder="Nêu bài Vật lí bạn đang vướng, hoặc mô tả chỗ chưa hiểu..."></textarea>
          <button class="sendbtn" id="sendBtn">Gửi</button>
        </div>
      </div>
    `;
    renderMessages();
    document.getElementById('switchBtn').onclick = ()=>{ state.screen='login'; state.code=null; render(); };
    document.getElementById('sendBtn').onclick = handleSend;
    document.getElementById('input').addEventListener('keydown', e=>{
      if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); handleSend(); }
    });
  }

  function renderMessages(){
    const box = document.getElementById('messages');
    if(!box) return;
    let html = '';
    if(state.messages.length === 0){
      html += `<div class="msg system-note">Hãy bắt đầu bằng việc mô tả bạn đang làm bài gì và đang vướng ở đâu (Bước Critique). Đừng hỏi thẳng đáp số nhé!</div>`;
    }
    for(const m of state.messages){
      if(m.role === 'user'){
        html += `<div class="msg user">${escapeHtml(m.content)}</div>`;
      } else {
        const tagMatch = m.content.match(/^\\[(CRITIQUE|CORE|CONSOLIDATE)\\]/i);
        const tag = tagMatch ? `<span class="step-tag">${tagMatch[1].toUpperCase()}</span><br/>` : '';
        const body = tagMatch ? m.content.replace(tagMatch[0],'').trim() : m.content;
        html += `<div class="msg assistant">${tag}${escapeHtml(body)}</div>`;
      }
    }
    if(state.sending){
      html += `<div class="typing">AI đang gợi ý...</div>`;
    }
    box.innerHTML = html;
    box.scrollTop = box.scrollHeight;
  }

  async function handleSend(){
    const ta = document.getElementById('input');
    const text = ta.value.trim();
    if(!text || state.sending) return;
    ta.value = '';
    state.messages.push({role:'user', content:text, ts:Date.now()});
    state.sending = true;
    renderMessages();
    document.getElementById('sendBtn').disabled = true;

    try{
      let replyText = await askAI(state.messages);
      if(!replyText){ replyText = '[CORE]\\nXin lỗi, mình chưa nhận được phản hồi rõ ràng. Bạn thử mô tả lại chỗ đang vướng nhé?'; }
      state.messages.push({role:'assistant', content:replyText, ts:Date.now()});
    }catch(e){
      state.messages.push({role:'assistant', content:'[CORE]\\nCó lỗi kết nối, bạn thử gửi lại câu hỏi nhé.', ts:Date.now()});
    }
    state.sending = false;
    document.getElementById('sendBtn').disabled = false;
    renderMessages();
    saveHistory();
  }

  // ---------- Researcher view ----------
  async function loadResearcherLogs(){
    try{
      const listRes = await window.storage.list('log:', true);
      const keys = (listRes && listRes.keys) || [];
      const logs = [];
      for(const k of keys){
        try{
          const r = await window.storage.get(k, true);
          if(r && r.value){
            logs.push({ key:k, code:k.replace('log:',''), messages: JSON.parse(r.value) });
          }
        }catch(e){}
      }
      state.researcherLogs = logs;
    }catch(e){
      state.researcherLogs = [];
    }
    renderResearcher();
  }

  function renderResearcher(){
    root.innerHTML = `
      <div class="topbar">
        <div class="brand">Nhật ký hội thoại · Nhóm nghiên cứu<small>Phân loại Critique – Core – Consolidate</small></div>
        <div class="actions">
          <button class="pillbtn" id="backBtn">← Quay lại</button>
        </div>
      </div>
      <div class="researcher">
        <div class="warn">Dữ liệu ở đây dùng chung (shared storage): bất kỳ ai mở công cụ này đều có thể xem danh sách log. Chỉ dùng mã số (không có tên thật) để đảm bảo ẩn danh theo mục 3.3.4.</div>
        <div class="toolbar">
          <button class="smallbtn" id="refreshBtn">Tải lại danh sách</button>
          <button class="smallbtn secondary" id="exportBtn">Tải toàn bộ dữ liệu (JSON)</button>
        </div>
        <div id="logList"></div>
      </div>
    `;
    document.getElementById('backBtn').onclick = ()=>{ state.screen='login'; render(); };
    document.getElementById('refreshBtn').onclick = loadResearcherLogs;
    document.getElementById('exportBtn').onclick = exportLogs;

    const list = document.getElementById('logList');
    if(state.researcherLogs === null){
      list.innerHTML = `<div class="empty">Đang tải log...</div>`;
      return;
    }
    if(state.researcherLogs.length === 0){
      list.innerHTML = `<div class="empty">Chưa có log nào được ghi nhận.</div>`;
      return;
    }
    list.innerHTML = state.researcherLogs.map(log=>{
      const isOpen = state.openLogKey === log.key;
      const bodyHtml = log.messages.map(m=>{
        const who = m.role==='user' ? 'Học sinh' : 'AI';
        return `<div style="margin-bottom:8px;"><b style="font-size:12px;color:var(--navy);">${who}:</b> <span style="font-size:13px;">${escapeHtml(m.content)}</span></div>`;
      }).join('');
      return `
        <div class="logrow">
          <div class="logrow-head" data-key="${escapeHtml(log.key)}">
            <b>Mã số: ${escapeHtml(log.code)}</b>
            <span>${log.messages.length} lượt thoại ${isOpen ? '▲' : '▼'}</span>
          </div>
          <div class="logrow-body ${isOpen?'open':''}">${bodyHtml || '<span class="empty">Trống</span>'}</div>
        </div>
      `;
    }).join('');

    list.querySelectorAll('.logrow-head').forEach(el=>{
      el.onclick = ()=>{
        const key = el.getAttribute('data-key');
        state.openLogKey = state.openLogKey === key ? null : key;
        renderResearcher();
      };
    });
  }

  function exportLogs(){
    if(!state.researcherLogs) return;
    const blob = new Blob([JSON.stringify(state.researcherLogs, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'log-hoi-thoai-3C.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function escapeHtml(str){
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  render();
})();
</script>
